name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="dfam-curator-${VERSION}-${{ matrix.target }}.tar.gz"
          STAGING="dfam-curator-${VERSION}"
          mkdir -p "${STAGING}/bin"
          cp target/${{ matrix.target }}/release/linup \
             target/${{ matrix.target }}/release/stk \
             target/${{ matrix.target }}/release/discoord \
             target/${{ matrix.target }}/release/update-cache \
             "${STAGING}/bin/"
          cp README.md Dfam_Seeds.md LICENSE "${STAGING}/"
          cp -r examples "${STAGING}/"
          tar czf "${ARCHIVE}" "${STAGING}"
          echo "ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          $ARCHIVE = "dfam-curator-${VERSION}-${{ matrix.target }}.zip"
          $Staging = "dfam-curator-${VERSION}"
          $BinDir = "target/${{ matrix.target }}/release"
          New-Item -ItemType Directory -Path "${Staging}/bin" | Out-Null
          Copy-Item "${BinDir}/linup.exe",
                    "${BinDir}/stk.exe",
                    "${BinDir}/discoord.exe",
                    "${BinDir}/update-cache.exe" `
                    -Destination "${Staging}/bin/"
          Copy-Item "README.md","Dfam_Seeds.md","LICENSE" -Destination "${Staging}/"
          Copy-Item "examples" -Destination "${Staging}/" -Recurse
          Compress-Archive -Path "${Staging}" -DestinationPath $ARCHIVE
          echo "ARCHIVE=$ARCHIVE" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
